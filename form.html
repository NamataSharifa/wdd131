<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Product Review Form | Product Review</title>

  
  <meta name="description" content="Submit a product review by selecting a product, rating it, and sharing your feedback.">
  <meta name="author" content="Namata Sharifa">

  <link rel="stylesheet" href="styles/styles.css">
  <script src="scripts/script.js" defer></script>
</head>

<body>
  <header>
    <h1>Product Review</h1>
  </header>

  <main>
    <form method="get" action="review.html">

      <!-- Product Name -->
      <label for="product">Product Name</label>
      <select id="product" name="product" required>
        <option value="" disabled selected>Select a Product ...</option>
      </select>

      <!-- Rating -->
      <fieldset>
        <legend>Overall Rating</legend>

        <input type="radio" id="rate1" name="rating" value="1" required>
        <label for="rate1">☆</label>

        <input type="radio" id="rate2" name="rating" value="2" required>
        <label for="rate2">☆☆</label>

        <input type="radio" id="rate3" name="rating" value="3" required>
        <label for="rate3">☆☆☆</label>

        <input type="radio" id="rate4" name="rating" value="4" required>
        <label for="rate4">☆☆☆☆</label>

        <input type="radio" id="rate5" name="rating" value="5" required>
        <label for="rate5">☆☆☆☆☆</label>

      </fieldset>

      <!-- Date -->
      <label for="date">Date of Installation</label>
      <input type="date" id="date" name="date" required>

      <!-- Features -->
      <fieldset>
        <legend>Useful Features</legend>

        <input type="checkbox" id="fast" name="features" value="fast">
        <label for="fast">Fast</label>

        <input type="checkbox" id="durable" name="features" value="durable">
        <label for="durable">Durable</label>

        <input type="checkbox" id="easy" name="features" value="easy">
        <label for="easy">Easy to Use</label>

        <input type="checkbox" id="affordable" name="features" value="affordable">
        <label for="affordable">Affordable</label>

      </fieldset>

      <!-- Review -->
      <label for="review">Written Review</label>
      <textarea id="review" name="review"></textarea>

      <!-- Name -->
      <label for="username">Your Name</label>
      <input type="text" id="username" name="username">

      <!-- Submit -->
      <input type="submit" value="Submit Review">

    </form>
  </main>

  <footer>
    <p>&copy; 2026 | Namata Sharifa</p>
  </footer>
</body>
</html>
