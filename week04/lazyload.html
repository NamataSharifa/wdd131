<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazy Loading Images</title>

    <!-- CSS -->
    <link rel="stylesheet" href="styles/lazyload.css">
</head>

<body>

<main>
    <h1>Lazy Loading Image Gallery</h1>

    <!-- Images -->
    <img src="https://picsum.photos/400/600?random=1" alt="Image 1" loading="lazy">
    <img src="https://picsum.photos/400/600?random=2" alt="Image 2" loading="lazy">
    <img src="https://picsum.photos/400/600?random=3" alt="Image 3" loading="lazy">
    <img src="https://picsum.photos/400/600?random=4" alt="Image 4" loading="lazy">
    <img src="https://picsum.photos/400/600?random=5" alt="Image 5" loading="lazy">
    <img src="https://picsum.photos/400/600?random=6" alt="Image 6" loading="lazy">
</main>

<footer>
    <p>&copy; 2026 | Lazy Load Demo</p>
    <p id="lastModified"></p>
</footer>

<!-- JavaScript -->
<script src="scripts/lazyload.js"></script>

</body>
</html>
